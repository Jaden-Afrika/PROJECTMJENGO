name: Build and Deploy Project Mjengo to Firebase

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull the repository files down
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup the exact Node engine
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Clean install all modules including Tailwind dev dependencies
      - name: Install All Dependencies
        working-directory: ./project-mjengo
        run: npm install --legacy-peer-deps --include=dev

      # 4. Force compilation while completely ignoring breaking warnings
      - name: Build React Application
        working-directory: ./project-mjengo
        run: npx cross-env CI=false npm run build
        env:
          REACT_APP_FIREBASE_API_KEY: ${{ secrets.REACT_APP_FIREBASE_API_KEY }}
          REACT_APP_FIREBASE_AUTH_DOMAIN: "project-mjengo.firebaseapp.com"
          REACT_APP_FIREBASE_PROJECT_ID: "project-mjengo"
          REACT_APP_FIREBASE_STORAGE_BUCKET: "project-mjengo.firebasestorage.app"
          REACT_APP_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.REACT_APP_FIREBASE_MESSAGING_SENDER_ID }}
          REACT_APP_FIREBASE_APP_ID: ${{ secrets.REACT_APP_FIREBASE_APP_ID }}
          REACT_APP_FIREBASE_MEASUREMENT_ID: "G-4PKCBDHN83"

      # 5. Deploy the generated build folder cleanly to Firebase
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_PROJECT_MJENGO }}'
          projectId: project-mjengo
          channelId: live
          entryPoint: .