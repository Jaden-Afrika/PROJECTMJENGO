name: Build and Deploy Project Mjengo to Firebase

on:
  push:
    branches:
      - main # Triggers the pipeline automatically when you push to main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull the latest version of your code onto the GitHub runner
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup Node environment
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Clean install all project dependencies
      - name: Install Dependencies
        run: npm ci

      # 4. Compile the production-ready build and inject your secure secrets
      - name: Build React Application
        run: npm run build
        env:
          CI: false # Stops warning flags from treating warnings as compilation errors
          REACT_APP_FIREBASE_API_KEY: ${{ secrets.REACT_APP_FIREBASE_API_KEY }}
          REACT_APP_FIREBASE_AUTH_DOMAIN: "project-mjengo.firebaseapp.com"
          REACT_APP_FIREBASE_PROJECT_ID: "project-mjengo"
          REACT_APP_FIREBASE_STORAGE_BUCKET: "project-mjengo.firebasestorage.app"
          REACT_APP_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.REACT_APP_FIREBASE_MESSAGING_SENDER_ID }}
          REACT_APP_FIREBASE_APP_ID: ${{ secrets.REACT_APP_FIREBASE_APP_ID }}
          REACT_APP_FIREBASE_MEASUREMENT_ID: "G-4PKCBDHN83"

      # 5. Ship the optimized build directory straight to Firebase hosting
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_TOKEN }}'
          projectId: project-mjengo
          channelId: live